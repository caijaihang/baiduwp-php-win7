name: Build Win7 EXE Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Download PHP Desktop Chrome 57
        shell: powershell
        run: |
          $url = "https://master.dl.sourceforge.net/project/php-desktop.mirror/chrome-v57.0-rc/phpdesktop-chrome-57.0-rc-php-7.1.3.zip?viasf=1"
          Write-Host "Downloading PHP Desktop Chrome 57..."
          try {
            Invoke-WebRequest -Uri $url -OutFile "phpdesktop.zip" -TimeoutSec 180 -UserAgent "Mozilla/5.0"
            Write-Host "Download successful"
          } catch {
            Write-Host "Direct download failed, trying backup..."
            $backupUrl = "https://github.com/cztomczak/phpdesktop/files/856210/phpdesktop-chrome-57.0-rc-php-7.1.3.zip"
            Invoke-WebRequest -Uri $backupUrl -OutFile "phpdesktop.zip" -TimeoutSec 180
          }
          Expand-Archive -Path "phpdesktop.zip" -DestinationPath ".\phpdesktop" -Force
          Remove-Item "phpdesktop.zip"
          Write-Host "PHP Desktop extracted"

      - name: Download baiduwp-php source
        shell: powershell
        run: |
          $zipUrl = "https://github.com/yuantuo666/baiduwp-php/archive/refs/heads/master.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile "baiduwp.zip" -TimeoutSec 120
          Expand-Archive -Path "baiduwp.zip" -DestinationPath ".\temp_src" -Force
          Remove-Item "baiduwp.zip"
          $subDir = Get-ChildItem -Path ".\temp_src" -Directory | Select-Object -First 1
          if ($subDir) {
            Move-Item -Path $subDir.FullName -Destination ".\baiduwp-php" -Force
          }
          Remove-Item -Path ".\temp_src" -Recurse -Force
          Write-Host "baiduwp-php source downloaded"

      - name: Merge into PHP Desktop
        shell: powershell
        run: |
          if (Test-Path ".\phpdesktop\www") {
            Remove-Item -Path ".\phpdesktop\www" -Recurse -Force
          }
          Move-Item -Path ".\baiduwp-php" -Destination ".\phpdesktop\www" -Force
          Copy-Item -Path ".\assets\settings.json" -Destination ".\phpdesktop\settings.json" -Force
          $phpIni = ".\phpdesktop\php\php.ini"
          if (Test-Path $phpIni) {
            $content = Get-Content $phpIni -Raw
            $content = $content -replace ';extension=php_curl.dll', 'extension=php_curl.dll'
            $content = $content -replace ';extension=php_openssl.dll', 'extension=php_openssl.dll'
            $content = $content -replace ';extension=php_mbstring.dll', 'extension=php_mbstring.dll'
            $content | Set-Content $phpIni -NoNewline
          }
          Write-Host "Merge completed"

      - name: Package ZIP
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "" -or $version -eq "refs/heads/main") {
            $version = "nightly"
          }
          $zipName = "baiduwp-php-win7-x86-$version.zip"
          Compress-Archive -Path ".\phpdesktop\*" -DestinationPath ".\$zipName" -Force
          Write-Host "Package created: $zipName"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: baiduwp-php-win7-exe
          path: baiduwp-php-win7-x86-*.zip

      - name: Release to GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: baiduwp-php-win7-x86-*.zip
          name: BaiduWP PHP Win7 EXE ${{ github.ref_name }}
          body: |
            BaiduWP PHP Win7 Desktop Edition

            Requirements:
            - Windows 7 SP1 or later (32/64 bit)
            - Visual C++ Redistributable for VS 2015 (x86)

            Usage:
            1. Download and extract the ZIP
            2. Double-click phpdesktop.exe
            3. Configure SVIP Cookie in www/config.php
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
